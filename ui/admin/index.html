<!DOCTYPE html>
<!--
  Trang shell chính của admin UI.
  - Giữ layout admin cũ (sidebar + header + content).
  - Dùng Tailwind CDN cho utility class.
  - Logic đã được tách ra nhiều file trong `ui/admin/app/`.
  - Các script phía dưới nạp theo thứ tự phụ thuộc.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMS Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="overflow-hidden bg-slate-50 text-slate-900 antialiased">
    <div id="layoutShell" class="h-screen overflow-hidden lg:grid lg:grid-cols-[280px_1fr]">
      <aside
        id="sidebar"
        data-collapsed="false"
        class="sidebar fixed inset-y-0 left-0 z-30 flex h-screen w-72 -translate-x-full flex-col bg-slate-900 text-white transition-transform duration-300 lg:static lg:translate-x-0"
      >
        <div class="flex h-16 shrink-0 items-center gap-3 border-b border-slate-800 px-6">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center">
            <img src="../../src/img/logo.png" alt="PMS logo" class="block h-10 w-10 object-contain" />
          </div>
          <div class="sidebar-brand-text">
            <p class="text-sm font-semibold tracking-wide">PMS Admin</p>
            <p class="text-xs text-slate-400">pms</p>
          </div>
        </div>

        <nav class="flex-1 overflow-y-auto space-y-6 px-4 py-6" role="tablist"></nav>

        <div class="shrink-0 border-t border-slate-800 px-6 py-4">
          <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-full bg-teal-500/20 text-center text-sm leading-10 text-teal-200">PA</div>
            <div class="sidebar-user-text">
              <p id="userName" class="text-sm font-semibold">PMS Admin</p>
              <p class="text-xs text-slate-400">Administrator</p>
            </div>
          </div>
        </div>
      </aside>

      <div class="flex min-h-screen flex-col overflow-hidden">
        <header class="sticky top-0 z-20 flex h-16 items-center justify-between gap-4 border-b border-slate-200 bg-white/90 px-4 backdrop-blur sm:px-6">
          <div class="flex items-center gap-3">
            <button
              id="menuToggle"
              class="flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors"
              type="button"
            >
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
              </svg>
            </button>
          </div>

          <div class="flex flex-1 items-center justify-center px-2 sm:px-6">
            <div id="searchBox" class="search-box is-open relative flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              <input
                id="searchInput"
                type="text"
                placeholder="Search modules or features..."
                class="search-input rounded-full border border-slate-200 bg-slate-50 py-2 pl-10 pr-4 text-sm text-slate-700 focus:border-teal-500 focus:outline-none focus:ring-2 focus:ring-teal-200 transition-all"
              />
            </div>
          </div>

          <div class="flex items-center gap-2">
            <button id="languageToggle" class="h-10 w-10 hidden items-center justify-center rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors sm:flex" title="Language" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
              </svg>
            </button>
            <button class="relative flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors" title="Notifications" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
              </svg>
              <span id="notifBadge" class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-rose-500 text-[10px] text-white font-medium">5</span>
            </button>
            <div class="hidden text-right sm:block">
              <p class="text-xs text-slate-500">Welcome,</p>
              <p id="headerUser" class="text-sm font-semibold text-slate-800">PMS Admin</p>
            </div>
          </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8">
          <!-- Breadcrumbs -->
          <nav id="breadcrumbs" class="mb-4 flex items-center gap-2 text-sm">
            <a href="#" class="text-teal-600 hover:text-teal-700 font-medium transition-colors">Home</a>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
            <span id="breadcrumbCurrent" class="text-slate-600">Dashboard</span>
          </nav>

          <div class="mb-6 flex flex-col gap-2">
            <h1 id="pageTitle" class="text-2xl font-semibold text-slate-900">Admin overview</h1>
            <p id="pageSubtitle" class="text-sm text-slate-500">Classic admin shell with cleaner content inside each tab.</p>
          </div>

          <section id="contentArea" class="space-y-6"></section>
        </main>
      </div>
    </div>

    <div id="sidebarOverlay" class="sidebar-overlay hidden lg:hidden"></div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <!--
      Thứ tự script rất quan trọng:
      1. state / i18n / modules / storage
      2. shared renderers
      3. dashboard + module renderers
      4. header / theme / sidebar
      5. bootstrap để khởi động app
    -->
    <script src="./app/state.js"></script>
    <script src="./app/i18n.js"></script>
    <script src="./app/modules.js"></script>
    <script src="./app/services/storage.js"></script>
    <script src="./app/renderers/shared.js"></script>
    <script src="./app/renderers/dashboard.js"></script>
    <script src="./app/renderers/module.js"></script>
    <script src="./app/ui/header.js"></script>
    <script src="./app/ui/theme.js"></script>
    <script src="./app/ui/sidebar.js"></script>
    <script src="./app/bootstrap.js"></script>
  </body>
</html>
