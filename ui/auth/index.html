<!DOCTYPE html>
<!--
  Trang đăng nhập demo.
  - Dùng để mô phỏng UI auth đơn giản.
  - Hiện chưa submit tới backend thật.
  - Các input và nút mới chỉ là phần giao diện để nối tiếp sau này.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <link rel="stylesheet" href="../shared/styles/tokens.css" />
    <link rel="stylesheet" href="../shared/styles/base.css" />
    <style>
      .auth-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 0;
      }

      .auth-card {
        width: min(100% - 32px, 960px);
        display: grid;
        grid-template-columns: 1fr 1fr;
        overflow: hidden;
      }

      .auth-visual,
      .auth-form {
        padding: 36px;
      }

      .auth-visual {
        background: var(--surface-muted);
        display: grid;
        place-items: center;
        border-right: 1px solid var(--border);
      }

      .auth-visual img {
        width: min(100%, 260px);
        height: auto;
        object-fit: contain;
      }

      .auth-form form {
        display: grid;
        gap: 16px;
        margin-top: 24px;
      }

      .auth-form label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      .auth-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        color: var(--text-muted);
        font-size: 0.95rem;
      }

      @media (max-width: 860px) {
        .auth-card {
          grid-template-columns: 1fr;
        }

        .auth-visual {
          border-right: 0;
          border-bottom: 1px solid var(--border);
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-shell">
      <section class="simple-card auth-card">
        <div class="auth-visual">
          <img src="../../src/img/logo.png" alt="Application logo" />
        </div>

        <div class="auth-form">
          <h1 class="section-title">Sign in</h1>
          <p class="section-subtitle">Access the system with a simple and clear login form.</p>

          <form>
            <div>
              <label for="email">Email</label>
              <input id="email" class="input" type="email" placeholder="admin@example.com" />
            </div>

            <div>
              <label for="password">Password</label>
              <input id="password" class="input" type="password" placeholder="••••••••" />
            </div>

            <div class="auth-meta">
              <label style="display: inline-flex; align-items: center; gap: 8px; margin: 0; font-weight: 400;">
                <input type="checkbox" />
                <span>Remember me</span>
              </label>
              <a href="#">Forgot password?</a>
            </div>

            <button class="btn btn-primary" type="submit">Sign in</button>
          </form>
        </div>
      </section>
    </div>
  </body>
</html>
